# O plano gratuito do Supabase pausa projetos após ~1 semana sem uso.
# Este workflow "visita" o banco toda segunda e quinta para mantê-lo ativo.
name: Supabase Keep-Alive

on:
  schedule:
    - cron: "0 12 * * 1,4" # seg e qui às 12h UTC (9h Brasília)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -sf "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/musicas?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -o /dev/null
          echo "Supabase ativo ✅"
